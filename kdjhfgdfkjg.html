<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>API Explorer — APIs.guru</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f2;
      --bg-info: #e6f1fb;
      --bg-success: #eaf3de;
      --bg-danger: #fcebeb;
      --text: #1a1a18;
      --text-secondary: #5f5e5a;
      --text-tertiary: #888780;
      --text-info: #185fa5;
      --text-success: #3b6d11;
      --text-danger: #a32d2d;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.3);
      --radius-md: 8px;
      --radius-lg: 12px;
    }
 
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1e1e1c;
        --bg-secondary: #2a2a28;
        --bg-info: #042c53;
        --bg-success: #173404;
        --bg-danger: #501313;
        --text: #f0efea;
        --text-secondary: #b4b2a9;
        --text-tertiary: #888780;
        --text-info: #85b7eb;
        --text-success: #97c459;
        --text-danger: #f09595;
        --border: rgba(255,255,255,0.12);
        --border-hover: rgba(255,255,255,0.3);
      }
    }
 
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-secondary);
      color: var(--text);
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
    }
 
    header {
      background: var(--bg);
      border-bottom: 0.5px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 500; }
    header span { font-size: 13px; color: var(--text-secondary); }
 
    main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.25rem 3rem; }
 
    .search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .search-row input {
      flex: 1;
      padding: 8px 14px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    .search-row input:focus { border-color: var(--border-hover); }
    .search-row button {
      padding: 8px 16px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 15px;
      transition: background 0.15s;
    }
    .search-row button:hover { background: var(--bg-secondary); }
 
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .badge {
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
      background: var(--bg);
      border: 0.5px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .badge:hover { border-color: var(--border-hover); }
    .badge.active { background: var(--bg-info); color: var(--text-info); border-color: transparent; }
 
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.25rem; }
    .stat { background: var(--bg); border-radius: var(--radius-md); padding: 0.75rem 1rem; border: 0.5px solid var(--border); }
    .stat-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .stat-val { font-size: 22px; font-weight: 500; }
 
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
    .card {
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.1s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
    .card-title { font-size: 14px; font-weight: 500; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-version { font-size: 11px; color: var(--text-tertiary); margin-bottom: 6px; }
    .card-desc { font-size: 12px; color: var(--text-secondary); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; min-height: 34px; }
    .card-footer { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
    .pill { font-size: 11px; padding: 2px 7px; border-radius: 10px; }
    .pill-info { background: var(--bg-info); color: var(--text-info); }
    .pill-success { background: var(--bg-success); color: var(--text-success); }
 
    .loader, .empty {
      text-align: center;
      color: var(--text-tertiary);
      padding: 4rem 0;
      font-size: 14px;
    }
    .loader i, .empty i { font-size: 32px; display: block; margin-bottom: 8px; }
 
    .error {
      color: var(--text-danger);
      background: var(--bg-danger);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      font-size: 14px;
    }
 
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-top: 1.5rem;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .pagination button {
      padding: 6px 14px;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s;
    }
    .pagination button:hover:not(:disabled) { background: var(--bg-secondary); }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
 
    @media (max-width: 600px) {
      header { padding: 1rem; }
      main { padding: 1rem 0.75rem 2rem; }
      .stats { grid-template-columns: repeat(3, 1fr); }
      .stat-val { font-size: 18px; }
    }
  </style>
</head>
<body>
 
<header>
  <i class="ti ti-api" style="font-size:24px;color:var(--text-info);" aria-hidden="true"></i>
  <div>
    <h1>API Explorer</h1>
    <span>Powered by APIs.guru — open directory of public APIs</span>
  </div>
</header>
 
<main>
  <div class="search-row">
    <input type="text" id="search" placeholder="Search APIs… (e.g. stripe, weather, maps)" autocomplete="off" />
    <button onclick="applyFilters()" aria-label="Search"><i class="ti ti-search" aria-hidden="true"></i></button>
  </div>
 
  <div class="filters" id="filters"></div>
 
  <div class="stats">
    <div class="stat"><div class="stat-label">Total APIs</div><div class="stat-val" id="total">—</div></div>
    <div class="stat"><div class="stat-label">Showing</div><div class="stat-val" id="showing">—</div></div>
    <div class="stat"><div class="stat-label">Page</div><div class="stat-val" id="pageinfo">—</div></div>
  </div>
 
  <div id="results">
    <div class="loader">
      <i class="ti ti-loader-2" aria-hidden="true"></i>
      Loading APIs from APIs.guru…
    </div>
  </div>
 
  <div class="pagination" id="pagination" style="display:none">
    <button id="prev" onclick="changePage(-1)">← Previous</button>
    <span id="page-label"></span>
    <button id="next" onclick="changePage(1)">Next →</button>
  </div>
</main>
 
<script>
  let allApis = [], filtered = [], page = 1;
  const PER_PAGE = 30;
  let activeCategory = null;
 
  const CATEGORIES = ['auth','payment','finance','weather','maps','email','social','ai','analytics','storage','health','sports','news'];
 
  async function load() {
    try {
      const res = await fetch('https://api.apis.guru/v2/list.json');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      allApis = Object.entries(data).map(([name, info]) => {
        const pref = info.versions[info.preferred] || Object.values(info.versions)[0];
        return {
          name,
          title: pref?.info?.title || name,
          description: pref?.info?.description || '',
          version: pref?.info?.version || '',
          url: pref?.info?.['x-origin']?.[0]?.url || '',
          swaggerUrl: pref?.swaggerUrl || '',
          tags: pref?.info?.['x-apisguru-categories'] || [],
        };
      });
      buildFilters();
      applyFilters();
    } catch(e) {
      document.getElementById('results').innerHTML =
        `<div class="error"><i class="ti ti-alert-circle"></i> Failed to load: ${e.message}.<br>Make sure you have an internet connection and try refreshing.</div>`;
    }
  }
 
  function buildFilters() {
    document.getElementById('filters').innerHTML = CATEGORIES.map(c =>
      `<span class="badge" onclick="setCategory('${c}')" id="cat-${c}">${c}</span>`
    ).join('');
  }
 
  function setCategory(c) {
    activeCategory = activeCategory === c ? null : c;
    document.querySelectorAll('.badge').forEach(b => b.classList.remove('active'));
    if (activeCategory) document.getElementById('cat-' + activeCategory)?.classList.add('active');
    page = 1;
    applyFilters();
  }
 
  function applyFilters() {
    const q = document.getElementById('search').value.toLowerCase();
    filtered = allApis.filter(a => {
      const matchQ = !q || a.title.toLowerCase().includes(q) || a.name.toLowerCase().includes(q) || a.description.toLowerCase().includes(q);
      const matchCat = !activeCategory || a.tags.some(t => t.toLowerCase().includes(activeCategory));
      return matchQ && matchCat;
    });
    page = 1;
    render();
  }
 
  function render() {
    const total = filtered.length;
    const pages = Math.ceil(total / PER_PAGE) || 1;
    const start = (page - 1) * PER_PAGE;
    const slice = filtered.slice(start, start + PER_PAGE);
 
    document.getElementById('total').textContent = allApis.length.toLocaleString();
    document.getElementById('showing').textContent = total.toLocaleString();
    document.getElementById('pageinfo').textContent = page + ' / ' + pages;
 
    const pg = document.getElementById('pagination');
    document.getElementById('page-label').textContent = 'Page ' + page + ' of ' + pages;
    document.getElementById('prev').disabled = page <= 1;
    document.getElementById('next').disabled = page >= pages;
    pg.style.display = total > PER_PAGE ? 'flex' : 'none';
 
    if (!slice.length) {
      document.getElementById('results').innerHTML = `<div class="empty"><i class="ti ti-search-off" aria-hidden="true"></i>No APIs found for this search.</div>`;
      return;
    }
 
    document.getElementById('results').innerHTML = '<div class="grid">' + slice.map(card).join('') + '</div>';
  }
 
  function card(a) {
    const link = a.swaggerUrl || a.url || ('https://apis.guru/browse-apis/' + a.name);
    return `<a class="card" href="${esc(link)}" target="_blank" rel="noopener">
      <div class="card-title" title="${esc(a.title)}">${esc(a.title)}</div>
      <div class="card-version">v${esc(a.version)}</div>
      <div class="card-desc">${esc(a.description)}</div>
      <div class="card-footer">
        ${a.tags.slice(0,2).map(t => `<span class="pill pill-info">${esc(t)}</span>`).join('')}
        ${a.swaggerUrl ? '<span class="pill pill-success">swagger</span>' : ''}
        ${a.url ? '<span class="pill pill-success">docs</span>' : ''}
      </div>
    </a>`;
  }
 
  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
 
  function changePage(dir) {
    const pages = Math.ceil(filtered.length / PER_PAGE);
    page = Math.max(1, Math.min(pages, page + dir));
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
 
  document.getElementById('search').addEventListener('input', () => { page = 1; applyFilters(); });
  document.getElementById('search').addEventListener('keydown', e => { if (e.key === 'Enter') applyFilters(); });
 
  load();
</script>
</body>
</html>
