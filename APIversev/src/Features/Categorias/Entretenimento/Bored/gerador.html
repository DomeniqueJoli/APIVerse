<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainBloom — Gerador</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <nav class="navbar navbar-expand bg-white sticky-top">
    <div class="container py-1">
      <img src="../images/logo.png" class="logo me-2">
      <div class="navbar-nav ms-auto align-items-center gap-2 gap-sm-3">
        <a href="../index.html" class="nav-link">Inicio</a>
        <a href="gerador.html" class="nav-link active">Atividades</a>
        <a href="perfil.html" class="nav-link">Perfil</a>
        <a href="info.html" class="nav-link">Sobre</a>
      </div>
    </div>
  </nav>

  <main class="container px-4 py-5">
    <section class="mb-4">
      <h2>Gerador de Atividades</h2>
      <p class="fs-5">Filtre, gere e salve</p>
    </section>
    <div id="app"></div>
    <div class="debug-box alert alert-warning" id="debugBox"></div>
  </main>

  <div class="toast text-bg-success position-fixed bottom-0 end-0 m-4 border-0" id="toast"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useCallback } = React;

    const CATEGORIES = {
      '':           'Qualquer tipo',
      education:    'Educacao',
      recreational: 'Lazer',
      social:       'Social',
      diy:          'Faca voce mesmo',
      charity:      'Caridade',
      cooking:      'Culinaria',
      relaxation:   'Relaxamento',
      music:        'Musica',
      busywork:     'Tarefas',
    };

    const PRICES = {
      '':   'Qualquer preco',
      free: 'Gratuito',
      low:  'Barato',
      mid:  'Medio',
      high: 'Caro',
    };

    function showDebug(msg) {
      const el = document.getElementById('debugBox');
      el.style.display = 'block';
      el.textContent = msg;
    }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2500);
    }

    function Skeleton() {
      return (
        <div className="card activity-card mb-4 placeholder-glow">
          <div className="card-body p-4">
            <span className="placeholder col-8 mb-3"></span>
            <span className="placeholder col-5 mb-4"></span>
            <div className="mb-4">
              <span className="placeholder rounded-pill col-6"></span>
            </div>
            <span className="placeholder rounded-pill col-4"></span>
          </div>
        </div>
      );
    }

    function ActivityCard({ activity, onSave, saved }) {
      const priceLabel =
        activity.price === 0 ? 'Gratuito' :
        activity.price < 0.3 ? 'Barato'   :
        activity.price < 0.7 ? 'Medio'    : 'Caro';

      return (
        <div className="card activity-card mb-4">
          {saved && <span className="position-absolute top-0 end-0 m-3 badge rounded-pill text-bg-danger px-3 py-2">Salvo</span>}
          <div className="card-body p-4">
            <h2 className="h4 mb-3 pe-5">{activity.activity}</h2>
            <div className="d-flex flex-wrap gap-2 mb-4">
              <span className="badge rounded-pill text-bg-success px-3 py-2">{CATEGORIES[activity.type] || activity.type}</span>
              <span className="badge rounded-pill text-bg-success px-3 py-2">{activity.participants} {activity.participants === 1 ? 'pessoa' : 'pessoas'}</span>
              <span className="badge rounded-pill text-bg-danger px-3 py-2">{priceLabel}</span>
            </div>
            <button className="btn btn-danger px-4" onClick={onSave} disabled={saved}>
              {saved ? 'Salvo' : 'Salvar'}
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const [activity, setActivity] = useState(null);
      const [loading, setLoading]   = useState(false);
      const [error, setError]       = useState('');
      const [saved, setSaved]       = useState(false);
      const [category, setCategory] = useState('');
      const [price, setPrice]       = useState('');
      const [participants, setParticipants] = useState('');

      const fetchActivity = useCallback(async () => {
        setLoading(true);
        setError('');
        setSaved(false);
        setActivity(null);
        try {
          const params = new URLSearchParams();
          if (category)     params.append('type', category);
          if (participants) params.append('participants', participants);
          if (price === 'free') { params.append('minprice', 0); params.append('maxprice', 0); }
          else if (price === 'low')  { params.append('minprice', 0.01); params.append('maxprice', 0.29); }
          else if (price === 'mid')  { params.append('minprice', 0.3);  params.append('maxprice', 0.69); }
          else if (price === 'high') { params.append('minprice', 0.7);  params.append('maxprice', 1); }

          const url = `/api/activity?${params}`;
          showDebug('Requisicao: ' + url);
          const res  = await fetch(url);
          const data = await res.json();
          showDebug('Resposta:\n' + JSON.stringify(data, null, 2));

          if (!res.ok || data.error) setError(data.error || 'Nenhuma atividade encontrada com esses filtros.');
          else setActivity(data);
        } catch (e) {
          showDebug('ERRO: ' + e.message);
          setError('Erro de conexao. Verifique se o servidor esta rodando.');
        } finally {
          setLoading(false);
        }
      }, [category, price, participants]);

      return (
        <div>
          <div className="row g-3 mb-4">
            <div className="col-sm-6 col-lg-4">
              <select className="form-select" value={category} onChange={e => setCategory(e.target.value)}>
                {Object.entries(CATEGORIES).map(([v,l]) => <option key={v} value={v}>{l}</option>)}
              </select>
            </div>
            <div className="col-sm-6 col-lg-4">
              <select className="form-select" value={price} onChange={e => setPrice(e.target.value)}>
                {Object.entries(PRICES).map(([v,l]) => <option key={v} value={v}>{l}</option>)}
              </select>
            </div>
            <div className="col-sm-6 col-lg-4">
              <select className="form-select" value={participants} onChange={e => setParticipants(e.target.value)}>
                <option value="">Qualquer numero de pessoas</option>
                {[1,2,3,4,5].map(n => <option key={n} value={n}>{n} {n===1?'pessoa':'pessoas'}</option>)}
              </select>
            </div>
          </div>

          {loading && <Skeleton />}

          {!loading && error && (
            <div className="py-5">
              <p className="fw-bold text-danger">{error}</p>
            </div>
          )}

          {!loading && !error && activity && (
            <ActivityCard
              activity={activity}
              saved={saved}
              onSave={async () => {
                const user = localStorage.getItem('bb_user');
                if (!user) { toast('Faca login para salvar.'); return; }
                try {
                  const res = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, activity })
                  });
                  if (res.ok) { setSaved(true); toast('Atividade salva!'); }
                  else { const d = await res.json(); toast(d.error || 'Erro ao salvar.'); }
                } catch { toast('Erro de conexao.'); }
              }}
            />
          )}

          {!loading && !error && !activity && (
            <div className="py-5">
              <p>Clique no botao abaixo para buscar uma atividade.</p>
            </div>
          )}

          <div className="pb-5">
            <button className="btn btn-success btn-lg px-4" onClick={fetchActivity} disabled={loading}>
              {loading ? 'Buscando...' : 'Gerar nova atividade'}
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
